version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Pin AGP 8.7.3 + Kotlin 2.0.21 until coordinated migration (AGP 9 breaks plugin wiring).
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Compose BOM 2026.x lint detectors require newer Kotlin analysis API than 2.0.21.
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major"]
      # kotlinx-coroutines-android and kotlinx-coroutines-test must bump together.
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-coroutines-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
