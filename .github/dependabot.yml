version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Pinned until coordinated Kotlin/AGP upgrade (2.0.21 → 2.x, AGP 8.7.3 → 9.x)
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
      - dependency-name: "org.jetbrains.kotlin.android"
      - dependency-name: "com.google.devtools.ksp"
      # AGP pinned at 8.7.3 until Kotlin/Compose coordinated upgrade
      - dependency-name: "com.android.application"
      # Room 2.6.1 → 2.8.x requires kotlinx.serialization version bump (AbstractMethodError)
      - dependency-name: "androidx.room:room-runtime"
      - dependency-name: "androidx.room:room-ktx"
      - dependency-name: "androidx.room:room-compiler"
      # Hilt stack pinned (2.52 / 1.2.0) — bump together
      - dependency-name: "com.google.dagger:hilt-android"
      - dependency-name: "com.google.dagger:hilt-android-compiler"
      - dependency-name: "androidx.hilt:hilt-navigation-compose"
      - dependency-name: "androidx.hilt:hilt-work"
      - dependency-name: "androidx.hilt:hilt-compiler"
      # kotlinx-coroutines — android + test must bump together
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-coroutines-android"
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-coroutines-test"
      # AndroidX — activity 1.13+ / core 1.19+ need compileSdk 36–37 + AGP 8.9+/9.1+ (pinned at 8.7.3 / SDK 35)
      - dependency-name: "androidx.activity:activity-compose"
      - dependency-name: "androidx.activity:activity-ktx"
      - dependency-name: "androidx.activity:activity"
      - dependency-name: "androidx.core:core-ktx"
      - dependency-name: "androidx.core:core"
      - dependency-name: "androidx.appcompat:appcompat"
