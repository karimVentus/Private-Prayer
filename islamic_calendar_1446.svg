<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="980" viewBox="0 0 680 980" role="img" dir="rtl">
  <title>مواعيد المناسبات والأعياد الإسلامية 1446 هـ</title>
  <desc>Islamic events calendar for Hijri year 1446 AH. Gregorian dates computed with the same tabular algorithm as PrayerTime HijriCalculator (Umm al-Qura aligned). Not sighting-dependent.</desc>

  <defs>
